name: baby_sleep_sounds
description: Bebek uyku sesleri — sade ve kullanışlı Flutter uygulaması.
publish_to: 'none'
version: 2.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: any
  cupertino_icons: ^1.0.8
  just_audio: ^0.10.4
  audio_session: ^0.2.2
  audio_service: ^0.18.17
  provider: ^6.1.5
  shared_preferences: ^2.5.3
  firebase_core: ^4.0.0
  firebase_storage: ^13.0.0
  path_provider: ^2.1.5
  package_info_plus: ^8.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.6

flutter_launcher_icons:
  android: true
  ios: true
  remove_alpha_ios: true
  image_path: assets/icons/app-icon.png
  adaptive_icon_background: "#2D1B69"
  adaptive_icon_foreground: assets/icons/app-icon-foreground.png
  adaptive_icon_foreground_inset: 0

flutter_native_splash:
  color: "#2D1B69"
  android_12:
    color: "#2D1B69"

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/icons/
    - assets/images/app/
    - assets/images/whitenoise/
    - assets/images/lullaby/
    - assets/sounds/whitenoise/
    - assets/sounds/lullaby/
    - assets/sounds/turkish_lullaby/
    - assets/catalog_fallback.json
