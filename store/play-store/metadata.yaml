# Google Play Console — kopyala-yapıştır alanları
# Son güncelleme: 2.0.0 — Tngr

developer:
  name: Tngr
  contact_email: alperttungir@gmail.com
  brand_file: developer-brand.md

app:
  package_name: com.alfaapps.BabySleepSounds
  default_language: tr-TR

listing:
  tr:
    title: "Bebek Uyku Sesleri"
    short_description: "Bebeğiniz için ninni, beyaz gürültü ve rahatlatıcı sesler. Reklamsız."
    full_description_file: listing-tr.md
    category: PARENTING
    tags:
      - Bebek
      - Ninni
      - Uyku
      - Beyaz gürültü
      - Rahatlatıcı sesler
  en:
    title: "Baby Sleep Sounds"
    short_description: "Lullabies, white noise and calming sounds for your baby. Ad-free."
    full_description_file: listing-en.md
    category: PARENTING

content_rating:
  suggested: Everyone / PEGI 3 / USK 0
  questionnaire_hints:
    - No violence, gambling, or user-generated content
    - No ads in current version
    - No account or social features
    - Local favorites stored on device only

data_safety:
  collects_data: false
  shares_data: false
  encrypted_in_transit: not_applicable
  data_types: []
  notes: |
    Uygulama kişisel veri toplamaz. Favori sesler yalnızca cihazda
    (SharedPreferences) saklanır. Hesap, analitik ve reklam SDK'sı yok.

contact:
  email: "alperttungir@gmail.com"
  website: "https://alpertungir.github.io/baby-sleep-sounds/"
  privacy_policy_url: "https://alpertungir.github.io/baby-sleep-sounds/privacy-policy.html"

graphics:
  icon: store/play-store/graphics/icon-512.png
  feature_graphic: store/play-store/graphics/feature-graphic-1024x500.png
  phone_screenshots_dir: store/screenshots/android/
  screenshot_plan: screenshot-plan.md
  generate_script: app/tools/generate_play_store_graphics.py

release:
  version_name: "2.0.0"
  version_code: 1
  release_notes_file: ../release-notes/2.0.0-tr.txt
